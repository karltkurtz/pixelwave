<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Artwork — Pi Garage</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161c27;
            --amber: #f6ad55;
            --coral: #fc8181;
            --teal: #4fd1c5;
            --green: #68d391;
            --text: #e2e8f0;
            --muted: #718096;
            --border: #2d3748;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        #bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0e1117, #0d1f2d, #0e1a0e, #1a0e1a);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            z-index: -1;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 48px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(18px, 4vw, 28px);
            color: var(--amber);
            text-shadow: 0 0 20px rgba(246,173,85,0.4);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .logo span { color: var(--teal); }

        .subtitle {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .content {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .back-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--teal);
            background: rgba(79,209,197,0.1);
            border: 1px solid rgba(79,209,197,0.3);
            letter-spacing: 0.5px;
            display: inline-block;
            align-self: flex-start;
        }

        .back-btn:hover { box-shadow: 0 0 12px rgba(79,209,197,0.3); }

        .empty-state {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        .artwork-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            animation: fadeUp 0.5s ease both;
        }

        .artwork-canvas {
            width: 100%;
            border-radius: 8px;
            image-rendering: pixelated;
            display: block;
            margin-bottom: 12px;
        }

        .artwork-stamp {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .stamp-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: var(--amber);
            letter-spacing: 0.5px;
        }

        .stamp-detail {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>

    <div class="header">
        <div class="logo">Pi <span>Garage</span></div>
        <div class="subtitle">// PAST ARTWORK</div>
    </div>

    <div class="content">
        <a class="back-btn" href="/">← BACK TO BOARD</a>
        <div id="artwork-list"></div>
    </div>

    <script>
        const NUM_LEDS = 32;
        const CELL_SIZE = 16;

        function renderArtwork(entry, index) {
            const card = document.createElement('div');
            card.className = 'artwork-card';
            card.style.animationDelay = `${index * 0.07}s`;

            const canvas = document.createElement('canvas');
            canvas.width = NUM_LEDS * CELL_SIZE;
            canvas.height = CELL_SIZE;
            canvas.className = 'artwork-canvas';

            const ctx = canvas.getContext('2d');
            entry.board.forEach((color, i) => {
                const isLit = color.r > 0 || color.g > 0 || color.b > 0;
                ctx.fillStyle = isLit ? `rgb(${color.r},${color.g},${color.b})` : '#1a2030';
                ctx.beginPath();
                ctx.arc(i * CELL_SIZE + CELL_SIZE / 2, CELL_SIZE / 2, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
                ctx.fill();
            });

            const date = new Date(entry.time * 1000);
            const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const mins = Math.floor(entry.duration / 60);
            const secs = entry.duration % 60;
            const durationStr = entry.duration < 60 ? `${entry.duration}s` : `${mins}m ${secs}s`;
            const locationStr = entry.location && entry.location !== 'Unknown' ? ` — 📍 ${entry.location}` : '';

            const stamp = document.createElement('div');
            stamp.className = 'artwork-stamp';
            stamp.innerHTML = `
                <span class="stamp-name">✏️ ${entry.name || 'Anonymous'}</span>
                <span class="stamp-detail">${dateStr} at ${timeStr} — ${durationStr}${locationStr}</span>
            `;

            card.appendChild(canvas);
            card.appendChild(stamp);
            return card;
        }

        fetch('/artwork/entries')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('artwork-list');
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="empty-state">No artwork yet — be the first to draw something!</div>';
                    return;
                }
                data.forEach((entry, i) => list.appendChild(renderArtwork(entry, i)));
            });
    </script>
</body>
</html>
